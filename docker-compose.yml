version: "3.9"

services:

  backend:

    build:
      context: ./backend

    container_name: dealership-backend

    restart: always

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

  frontend:

    build:
      context: ./frontend

    container_name: dealership-frontend

    restart: always

    depends_on:
      - backend

    ports:
      - "3000:80"